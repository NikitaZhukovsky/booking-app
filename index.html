<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Настройка бронирования</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            padding: 16px;
        }

        .container { max-width: 460px; margin: auto; }

        .form-group { margin-bottom: 16px; }

        label { display:block; margin-bottom:6px; }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #ddd;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            font-size: 16px;
        }

        .days {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .days label {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .msg {
            margin-top: 10px;
            display: none;
        }

        .msg.show { display:block; }
    </style>
</head>

<body>
<div class="container">

    <h2>⚙️ Настройка бронирования</h2>

    <form id="form">

        <div class="form-group">
            <label>Email</label>
            <input id="email" type="email" required>
        </div>

        <div class="form-group">
            <label>Пароль</label>
            <input id="password" type="password" required>
        </div>

        <div class="form-group">
            <label>Место</label>
            <input id="spot" type="text" required>
        </div>

        <div class="form-group">
            <label>Дни</label>
            <div class="days">
                <label><input type="checkbox" value="0">Пн</label>
                <label><input type="checkbox" value="1">Вт</label>
                <label><input type="checkbox" value="2">Ср</label>
                <label><input type="checkbox" value="3">Чт</label>
                <label><input type="checkbox" value="4">Пт</label>
            </div>
        </div>

        <button type="submit">💾 Сохранить</button>

        <div id="msg" class="msg"></div>

    </form>

</div>

<script>
const tg = window.Telegram.WebApp;

tg.ready();      // ❗ ОБЯЗАТЕЛЬНО
tg.expand();

const form = document.getElementById("form");
const msg = document.getElementById("msg");

function show(text, ok = true) {
    msg.classList.add("show");
    msg.style.color = ok ? "green" : "red";
    msg.textContent = text;

    setTimeout(() => msg.classList.remove("show"), 2500);
}

form.addEventListener("submit", (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const spot_id = document.getElementById("spot").value.trim();

    const booking_days = Array.from(
        document.querySelectorAll("input[type=checkbox]:checked")
    ).map(x => Number(x.value));

    if (!email || !password || !spot_id) {
        return show("Заполните все поля", false);
    }

    if (booking_days.length === 0) {
        return show("Выберите дни", false);
    }

    const data = {
        email,
        password,
        spot_id,
        booking_days
    };

    try {
        // ✅ ЕДИНСТВЕННАЯ отправка в бота
        tg.sendData(JSON.stringify(data));

        show("Отправлено!");
        
        setTimeout(() => tg.close(), 800);

    } catch (e) {
        show("Ошибка отправки", false);
    }
});
</script>

</body>
</html>
