<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Настройка бронирования</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 10px; text-align: center; }
        .subtitle { text-align: center; color: var(--tg-theme-hint-color, #999); margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--tg-theme-hint-color, #999); }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #ddd);
            border-radius: 10px;
            font-size: 16px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000);
        }
        .days-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .day-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 8px;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 20px;
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }
        .message.success { background: rgba(76, 175, 80, 0.1); color: #4caf50; border: 1px solid #4caf50; }
        .message.error { background: rgba(244, 67, 54, 0.1); color: #f44336; border: 1px solid #f44336; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ Настройка бронирования</h1>
        <div class="subtitle">Настройте автоматическое бронирование рабочего места</div>

        <form id="bookingForm">
            <div class="form-group">
                <label>📧 Email (логин)</label>
                <input type="email" id="email" required placeholder="example@company.com">
            </div>

            <div class="form-group">
                <label>🔒 Пароль</label>
                <input type="password" id="password" required>
            </div>

            <div class="form-group">
                <label>💺 Номер места</label>
                <input type="text" id="spot_id" required placeholder="Например: 168">
            </div>

            <div class="form-group">
                <label>📅 Дни для бронирования</label>
                <div class="days-container">
                    <label class="day-checkbox"><input type="checkbox" value="0"> Понедельник</label>
                    <label class="day-checkbox"><input type="checkbox" value="1"> Вторник</label>
                    <label class="day-checkbox"><input type="checkbox" value="2"> Среда</label>
                    <label class="day-checkbox"><input type="checkbox" value="3"> Четверг</label>
                    <label class="day-checkbox"><input type="checkbox" value="4"> Пятница</label>
                </div>
            </div>

            <button type="submit">💾 Сохранить настройки</button>
        </form>

        <div id="message" class="message"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        document.getElementById('bookingForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const spotId = document.getElementById('spot_id').value.trim();

            if (!email || !password) {
                showMessage('❌ Введите email и пароль', 'error');
                return;
            }

            if (!spotId) {
                showMessage('❌ Введите номер места', 'error');
                return;
            }

            const selectedDays = Array.from(document.querySelectorAll('input[type="checkbox"]:checked'))
                .map(cb => parseInt(cb.value));

            if (selectedDays.length === 0) {
                showMessage('❌ Выберите хотя бы один день', 'error');
                return;
            }

            const userData = { email, password, spot_id: spotId, booking_days: selectedDays };
            tg.sendData(JSON.stringify(userData));
            showMessage('✅ Настройки отправлены боту!', 'success');
            setTimeout(() => tg.close(), 2000);
        });

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
