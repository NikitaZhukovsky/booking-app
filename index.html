<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Настройка бронирования</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px 16px 32px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .container {
            max-width: 460px;
            width: 100%;
            margin: 0 auto;
            animation: fadeUp 0.5s cubic-bezier(0.2, 0.9, 0.3, 1);
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(24px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
            padding: 0 4px;
        }

        .header h1 {
            font-size: clamp(26px, 7vw, 34px);
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(145deg, var(--tg-theme-text-color, #000) 0%, var(--tg-theme-hint-color, #666) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .header .subtitle {
            color: var(--tg-theme-hint-color, #8e8e93);
            font-size: clamp(14px, 3.8vw, 17px);
            font-weight: 400;
            letter-spacing: 0.2px;
            opacity: 0.85;
        }

        .form-card {
            background: var(--tg-theme-secondary-bg-color, #f8f8fa);
            border-radius: 28px;
            padding: 20px 16px 24px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04), 0 2px 8px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: box-shadow 0.3s ease;
        }

        .form-group {
            margin-bottom: 20px;
            animation: slideFade 0.45s ease both;
        }

        .form-group:nth-child(1) { animation-delay: 0.04s; }
        .form-group:nth-child(2) { animation-delay: 0.09s; }
        .form-group:nth-child(3) { animation-delay: 0.14s; }
        .form-group:nth-child(4) { animation-delay: 0.19s; }

        @keyframes slideFade {
            0% { opacity: 0; transform: translateX(-10px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        label {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 7px;
            font-weight: 500;
            font-size: clamp(13px, 3.6vw, 15px);
            color: var(--tg-theme-hint-color, #8e8e93);
            letter-spacing: 0.2px;
            touch-action: manipulation;
        }

        label .emoji {
            font-size: clamp(18px, 4.8vw, 22px);
            line-height: 1;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid transparent;
            border-radius: 16px;
            font-size: clamp(15px, 4.2vw, 17px);
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            transition: all 0.25s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02), inset 0 1px 3px rgba(0,0,0,0.02);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            touch-action: manipulation;
        }

        input:focus {
            border-color: var(--tg-theme-button-color, #2481cc);
            background: var(--tg-theme-bg-color, #ffffff);
            box-shadow: 0 4px 16px rgba(36, 129, 204, 0.12), 0 0 0 4px rgba(36, 129, 204, 0.06);
            transform: scale(1.005);
        }

        input::placeholder {
            color: var(--tg-theme-hint-color, #b0b0b8);
            font-weight: 350;
            font-size: clamp(14px, 3.8vw, 16px);
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            font-size: 16px;
        }

        .days-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 10px;
            margin-top: 8px;
        }

        .day-checkbox {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 8px;
            background: var(--tg-theme-bg-color, #ffffff);
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            border: 1.5px solid transparent;
            font-weight: 480;
            font-size: clamp(13px, 3.6vw, 15px);
            color: var(--tg-theme-text-color, #000);
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            min-height: 48px;
        }

        .day-checkbox:active {
            transform: scale(0.95);
            background: var(--tg-theme-secondary-bg-color, #f0f0f2);
        }

        .day-checkbox input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 8px;
            border: 2px solid var(--tg-theme-hint-color, #c6c6c8);
            background: transparent;
            transition: all 0.2s ease;
            flex-shrink: 0;
            cursor: pointer;
            position: relative;
            margin: 0;
            padding: 0;
            box-shadow: none;
            transform: none;
            touch-action: manipulation;
        }

        .day-checkbox input[type="checkbox"]:checked {
            background: var(--tg-theme-button-color, #2481cc);
            border-color: var(--tg-theme-button-color, #2481cc);
            box-shadow: 0 4px 12px rgba(36, 129, 204, 0.25);
        }

        .day-checkbox input[type="checkbox"]:checked::after {
            content: "✓";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 15px;
            font-weight: 700;
        }

        .day-checkbox:has(input:checked) {
            border-color: var(--tg-theme-button-color, #2481cc);
            background: rgba(36, 129, 204, 0.05);
        }

        button {
            width: 100%;
            padding: 16px 20px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 20px;
            font-size: clamp(16px, 4.5vw, 18px);
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
            margin-top: 24px;
            box-shadow: 0 4px 16px rgba(36, 129, 204, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            min-height: 56px;
        }

        button::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
            pointer-events: none;
        }

        button:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(36, 129, 204, 0.2);
        }

        @media (hover: hover) {
            button:hover {
                transform: scale(1.01) translateY(-2px);
                box-shadow: 0 8px 28px rgba(36, 129, 204, 0.35);
            }
            .day-checkbox:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
                border-color: var(--tg-theme-button-color, #2481cc);
            }
        }

        .message {
            margin-top: 20px;
            padding: 14px 16px;
            border-radius: 20px;
            font-weight: 500;
            font-size: clamp(14px, 3.8vw, 16px);
            display: none;
            backdrop-filter: blur(4px);
            animation: popIn 0.35s cubic-bezier(0.2, 0.9, 0.3, 1);
            border: 1px solid transparent;
            text-align: center;
            word-break: break-word;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.94); }
            100% { opacity: 1; transform: scale(1); }
        }

        .message.success {
            background: rgba(52, 199, 89, 0.12);
            color: #34c759;
            border-color: rgba(52, 199, 89, 0.2);
            display: block;
        }

        .message.error {
            background: rgba(255, 69, 58, 0.10);
            color: #ff453a;
            border-color: rgba(255, 69, 58, 0.18);
            display: block;
        }

        .message.info {
            background: rgba(36, 129, 204, 0.08);
            color: var(--tg-theme-button-color, #2481cc);
            border-color: rgba(36, 129, 204, 0.12);
            display: block;
        }

        .footer-note {
            margin-top: 18px;
            text-align: center;
            font-size: clamp(11px, 3vw, 13px);
            color: var(--tg-theme-hint-color, #8e8e93);
            opacity: 0.6;
            letter-spacing: 0.2px;
        }

        @media (max-width: 400px) {
            .form-card {
                padding: 16px 12px 20px;
                border-radius: 24px;
            }
            .days-container {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
            .day-checkbox {
                padding: 10px 6px;
                min-height: 44px;
                font-size: 13px;
            }
            .day-checkbox input[type="checkbox"] {
                width: 20px;
                height: 20px;
            }
            input {
                padding: 12px 14px;
                font-size: 15px;
            }
            button {
                padding: 14px 16px;
                min-height: 50px;
                font-size: 16px;
            }
        }

        @media (max-width: 350px) {
            .days-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (prefers-color-scheme: dark) {
            .form-card {
                border-color: rgba(255, 255, 255, 0.04);
            }
            .day-checkbox {
                background: var(--tg-theme-bg-color, #1c1c1e);
            }
            input {
                background: var(--tg-theme-bg-color, #1c1c1e);
            }
            .day-checkbox:active {
                background: #2c2c2e;
            }
        }

        @supports (padding: max(0px)) {
            body {
                padding-left: max(16px, env(safe-area-inset-left));
                padding-right: max(16px, env(safe-area-inset-right));
                padding-bottom: max(32px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ Настройка</h1>
            <div class="subtitle">Автоматическое бронирование места</div>
        </div>

        <div class="form-card">
            <form id="bookingForm" action="javascript:void(0);">
                <div class="form-group">
                    <label><span class="emoji">📧</span> Email (логин)</label>
                    <input type="email" id="email" required placeholder="example@company.com" autocomplete="email" inputmode="email">
                </div>

                <div class="form-group">
                    <label><span class="emoji">🔒</span> Пароль</label>
                    <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
                </div>

                <div class="form-group">
                    <label><span class="emoji">💺</span> Номер места</label>
                    <input type="text" id="spot_id" required placeholder="Например: 168" autocomplete="off" inputmode="numeric">
                </div>

                <div class="form-group">
                    <label><span class="emoji">📅</span> Дни для бронирования</label>
                    <div class="days-container">
                        <label class="day-checkbox"><input type="checkbox" value="0"> Пн</label>
                        <label class="day-checkbox"><input type="checkbox" value="1"> Вт</label>
                        <label class="day-checkbox"><input type="checkbox" value="2"> Ср</label>
                        <label class="day-checkbox"><input type="checkbox" value="3"> Чт</label>
                        <label class="day-checkbox"><input type="checkbox" value="4"> Пт</label>
                    </div>
                </div>

                <button type="submit">💾 Сохранить</button>
            </form>

            <div id="message" class="message"></div>
            <div class="footer-note">Данные отправляются в защищённом канале</div>
        </div>
    </div>

    <script>
        (function() {
            const tg = window.Telegram.WebApp;
            tg.expand();

            const form = document.getElementById('bookingForm');
            const messageEl = document.getElementById('message');
            let timeoutId = null;

            // ====== ЛОГГЕР С ОТПРАВКОЙ В БОТА ======
            function sendLogToBot(level, message, data = null) {
                try {
                    const logData = {
                        type: 'debug_log',
                        level: level, // 'info', 'error', 'success'
                        message: message,
                        data: data,
                        timestamp: new Date().toISOString(),
                        user_id: tg.initDataUnsafe?.user?.id || 'unknown'
                    };
                    
                    // Отправляем в бот как отдельное сообщение
                    tg.sendData(JSON.stringify(logData));
                    
                    // Также выводим в консоль для десктопа
                    console.log(`[${level.toUpperCase()}] ${message}`, data || '');
                    
                } catch (e) {
                    // Если не удалось отправить лог, просто выводим в консоль
                    console.error('❌ Ошибка отправки лога:', e);
                }
            }

            // Обертка для удобства
            const log = {
                info: (msg, data) => sendLogToBot('info', msg, data),
                error: (msg, data) => sendLogToBot('error', msg, data),
                success: (msg, data) => sendLogToBot('success', msg, data)
            };

            // ====== ОТПРАВКА ЛОГОВ ПРИ ЗАГРУЗКЕ ======
            log.info('🚀 Mini App загружен');
            log.info('👤 User ID:', tg.initDataUnsafe?.user?.id || 'Не определен');
            log.info('🔗 URL:', window.location.href);
            log.info('📱 Platform:', tg.platform || 'unknown');

            // ====== ОБРАБОТКА ФОРМЫ ======
            function showMessage(text, type = 'info', duration = 3200) {
                if (timeoutId) clearTimeout(timeoutId);
                messageEl.textContent = text;
                messageEl.className = `message ${type}`;
                messageEl.style.display = 'block';

                timeoutId = setTimeout(() => {
                    messageEl.style.display = 'none';
                    messageEl.className = 'message';
                    timeoutId = null;
                }, duration);
            }

            form.addEventListener('submit', function(e) {
                e.preventDefault();

                log.info('📤 Форма отправлена');

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const spotId = document.getElementById('spot_id').value.trim();

                // Логируем каждый шаг
                log.info('📧 Email:', email ? '✅ заполнен' : '❌ пустой');
                log.info('🔒 Пароль:', password ? '✅ заполнен' : '❌ пустой');
                log.info('💺 Место:', spotId ? '✅ заполнено' : '❌ пустое');

                if (!email || !password) {
                    log.error('❌ Ошибка валидации: email или пароль пустые');
                    showMessage('❌ Введите email и пароль', 'error');
                    return;
                }

                if (!spotId) {
                    log.error('❌ Ошибка валидации: номер места пустой');
                    showMessage('❌ Введите номер места', 'error');
                    return;
                }

                const selectedDays = Array.from(document.querySelectorAll('input[type="checkbox"]:checked'))
                    .map(cb => parseInt(cb.value, 10));

                log.info('📅 Выбранные дни:', selectedDays);

                if (selectedDays.length === 0) {
                    log.error('❌ Ошибка: не выбраны дни');
                    showMessage('❌ Выберите хотя бы один день', 'error');
                    return;
                }

                const userData = {
                    email,
                    password,
                    spot_id: spotId,
                    booking_days: selectedDays
                };

                log.info('📦 Данные для отправки:', userData);

                try {
                    // Отправляем данные в бот
                    tg.sendData(JSON.stringify(userData));
                    log.success('✅ Данные успешно отправлены через tg.sendData()');
                    
                    showMessage('✅ Настройки сохранены!', 'success', 2500);

                    setTimeout(() => {
                        log.info('🔚 Закрываем Mini App');
                        tg.close();
                    }, 2300);
                } catch (error) {
                    log.error('❌ Ошибка при отправке:', error.message);
                    showMessage('❌ Ошибка отправки данных', 'error');
                }
            });

            // ====== ОБРАБОТЧИК ОТВЕТА ОТ БОТА ======
            tg.onEvent('web_app_data', function(data) {
                log.info('📩 Получен ответ от бота:', data);
                try {
                    const response = JSON.parse(data);
                    if (response.success) {
                        log.success('✅ Бот подтвердил сохранение');
                        showMessage('✅ ' + (response.message || 'Настройки сохранены!'), 'success');
                    } else {
                        log.error('❌ Бот вернул ошибку:', response.message);
                        showMessage('❌ ' + (response.message || 'Ошибка'), 'error');
                    }
                } catch {
                    log.info('📩 Ответ не JSON, возможно подтверждение');
                }
            });

            // ====== ПОДСКАЗКА ПРИ ЗАГРУЗКЕ ======
            setTimeout(() => {
                showMessage('✨ Заполните данные и сохраните', 'info', 2000);
            }, 500);

            // ====== СКРЫВАЕМ СООБЩЕНИЕ ПРИ ФОКУСЕ ======
            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('focus', () => {
                    if (messageEl.style.display === 'block' && !messageEl.classList.contains('success')) {
                        messageEl.style.display = 'none';
                        messageEl.className = 'message';
                        if (timeoutId) {
                            clearTimeout(timeoutId);
                            timeoutId = null;
                        }
                    }
                });
            });

            log.info('✅ Скрипт полностью загружен и готов к работе!');
            log.info('💡 Все логи отправляются в бота автоматически');

        })();
    </script>
</body>
</html>
