<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
    <title>Настройка бронирования</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #f2f2f7);
            color: var(--tg-theme-text-color, #000000);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            transition: background 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(30px) scale(0.97); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Десктопные улучшения */
        @media (min-width: 768px) {
            body {
                padding: 40px;
                background: var(--tg-theme-secondary-bg-color, #e5e5ea);
            }
            .container {
                max-width: 580px;
            }
            .form-card {
                padding: 36px 32px 40px;
                border-radius: 32px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 8px 24px rgba(0, 0, 0, 0.04);
            }
            .header h1 {
                font-size: 36px;
            }
            .header .subtitle {
                font-size: 18px;
            }
            .days-container {
                grid-template-columns: repeat(5, 1fr);
                gap: 12px;
            }
            .day-checkbox {
                padding: 14px 10px;
                min-height: 56px;
                font-size: 15px;
                border-radius: 20px;
            }
            .input-wrapper input {
                padding: 16px 20px;
                font-size: 17px;
                border-radius: 18px;
                padding-right: 56px;
            }
            .password-toggle {
                right: 18px;
                width: 28px;
                height: 28px;
                font-size: 20px;
            }
            button {
                padding: 18px 24px;
                font-size: 18px;
                border-radius: 24px;
                min-height: 64px;
                margin-top: 32px;
                letter-spacing: 0.5px;
            }
            .form-group {
                margin-bottom: 28px;
            }
            label {
                font-size: 15px;
                margin-bottom: 10px;
            }
            .message {
                padding: 16px 20px;
                font-size: 16px;
                border-radius: 24px;
                margin-top: 24px;
            }
            .footer-note {
                font-size: 13px;
                margin-top: 24px;
            }
        }

        /* Очень большие экраны */
        @media (min-width: 1200px) {
            .container {
                max-width: 640px;
            }
            .form-card {
                padding: 44px 40px 48px;
                border-radius: 40px;
            }
            .header h1 {
                font-size: 42px;
            }
            .header .subtitle {
                font-size: 20px;
            }
            .days-container {
                gap: 16px;
            }
            .day-checkbox {
                padding: 16px 12px;
                min-height: 60px;
                font-size: 16px;
            }
            .input-wrapper input {
                padding: 18px 24px;
                font-size: 18px;
                padding-right: 64px;
            }
            .password-toggle {
                right: 20px;
                width: 30px;
                height: 30px;
                font-size: 22px;
            }
            button {
                padding: 20px 28px;
                font-size: 20px;
                min-height: 68px;
            }
        }

        /* Мобильная версия (базовая) */
        .header {
            text-align: center;
            margin-bottom: 28px;
            padding: 0 4px;
        }

        .header h1 {
            font-size: clamp(28px, 7vw, 36px);
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(145deg, var(--tg-theme-text-color, #000) 0%, var(--tg-theme-hint-color, #666) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            line-height: 1.2;
        }

        .header .subtitle {
            color: var(--tg-theme-hint-color, #8e8e93);
            font-size: clamp(15px, 4vw, 18px);
            font-weight: 400;
            letter-spacing: 0.2px;
            opacity: 0.85;
        }

        .form-card {
            background: var(--tg-theme-bg-color, #ffffff);
            border-radius: 28px;
            padding: 24px 20px 28px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04), 0 2px 12px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }

        @media (hover: hover) {
            .form-card:hover {
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.06), 0 4px 16px rgba(0, 0, 0, 0.02);
                transform: translateY(-2px);
            }
        }

        .form-group {
            margin-bottom: 22px;
            animation: slideFade 0.5s ease both;
        }

        .form-group:nth-child(1) { animation-delay: 0.05s; }
        .form-group:nth-child(2) { animation-delay: 0.10s; }
        .form-group:nth-child(3) { animation-delay: 0.15s; }
        .form-group:nth-child(4) { animation-delay: 0.20s; }

        @keyframes slideFade {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: clamp(14px, 3.8vw, 15px);
            color: var(--tg-theme-hint-color, #8e8e93);
            letter-spacing: 0.2px;
            touch-action: manipulation;
        }

        label .emoji {
            font-size: clamp(18px, 5vw, 22px);
            line-height: 1;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid transparent;
            border-radius: 16px;
            font-size: clamp(15px, 4.2vw, 17px);
            background: var(--tg-theme-secondary-bg-color, #f8f8fa);
            color: var(--tg-theme-text-color, #000000);
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            padding-right: 52px;
        }

        .input-wrapper input:focus {
            border-color: var(--tg-theme-button-color, #2481cc);
            background: var(--tg-theme-bg-color, #ffffff);
            box-shadow: 0 0 0 4px rgba(36, 129, 204, 0.08), 0 4px 16px rgba(0, 0, 0, 0.02);
            transform: scale(1.005);
        }

        .input-wrapper input::placeholder {
            color: var(--tg-theme-hint-color, #b0b0b8);
            font-weight: 350;
            font-size: clamp(14px, 3.8vw, 16px);
        }

        /* Исправление зума на iOS */
        .input-wrapper input[type="email"],
        .input-wrapper input[type="password"],
        .input-wrapper input[type="text"] {
            font-size: 16px;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 12px;
            transition: all 0.2s ease;
            color: var(--tg-theme-hint-color, #8e8e93);
            font-size: clamp(18px, 4.8vw, 22px);
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            width: 40px;
            height: 40px;
        }

        @media (hover: hover) {
            .password-toggle:hover {
                background: rgba(0, 0, 0, 0.04);
                color: var(--tg-theme-text-color, #000);
            }
        }

        .password-toggle:active {
            transform: translateY(-50%) scale(0.92);
            background: rgba(0, 0, 0, 0.06);
        }

        .password-toggle:focus-visible {
            outline: 2px solid var(--tg-theme-button-color, #2481cc);
            outline-offset: 2px;
        }

        .days-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        @media (min-width: 480px) {
            .days-container {
                grid-template-columns: repeat(5, 1fr);
                gap: 12px;
            }
        }

        .day-checkbox {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 8px;
            background: var(--tg-theme-secondary-bg-color, #f8f8fa);
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1);
            border: 2px solid transparent;
            font-weight: 480;
            font-size: clamp(13px, 3.6vw, 15px);
            color: var(--tg-theme-text-color, #000);
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            min-height: 48px;
            position: relative;
        }

        @media (hover: hover) {
            .day-checkbox:hover {
                transform: translateY(-3px);
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
                border-color: var(--tg-theme-button-color, #2481cc);
                background: var(--tg-theme-bg-color, #ffffff);
            }
        }

        .day-checkbox:active {
            transform: scale(0.95);
        }

        .day-checkbox input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 8px;
            border: 2px solid var(--tg-theme-hint-color, #c6c6c8);
            background: transparent;
            transition: all 0.2s ease;
            flex-shrink: 0;
            cursor: pointer;
            position: relative;
            margin: 0;
            padding: 0;
            box-shadow: none;
            touch-action: manipulation;
        }

        .day-checkbox input[type="checkbox"]:checked {
            background: var(--tg-theme-button-color, #2481cc);
            border-color: var(--tg-theme-button-color, #2481cc);
            box-shadow: 0 4px 14px rgba(36, 129, 204, 0.25);
        }

        .day-checkbox input[type="checkbox"]:checked::after {
            content: "✓";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 15px;
            font-weight: 700;
            line-height: 1;
        }

        .day-checkbox:has(input:checked) {
            border-color: var(--tg-theme-button-color, #2481cc);
            background: rgba(36, 129, 204, 0.04);
        }

        button[type="submit"] {
            width: 100%;
            padding: 16px 20px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 20px;
            font-size: clamp(16px, 4.5vw, 18px);
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
            margin-top: 28px;
            box-shadow: 0 4px 20px rgba(36, 129, 204, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            touch-action: manipulation;
            min-height: 56px;
        }

        button[type="submit"]::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
            pointer-events: none;
        }

        @media (hover: hover) {
            button[type="submit"]:hover {
                transform: translateY(-3px) scale(1.01);
                box-shadow: 0 8px 32px rgba(36, 129, 204, 0.3);
            }
        }

        button[type="submit"]:active {
            transform: scale(0.96);
            box-shadow: 0 2px 12px rgba(36, 129, 204, 0.15);
        }

        .message {
            margin-top: 22px;
            padding: 14px 18px;
            border-radius: 20px;
            font-weight: 500;
            font-size: clamp(14px, 3.8vw, 16px);
            display: none;
            backdrop-filter: blur(4px);
            animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid transparent;
            text-align: center;
            word-break: break-word;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.94) translateY(8px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .message.success {
            background: rgba(52, 199, 89, 0.10);
            color: #34c759;
            border-color: rgba(52, 199, 89, 0.15);
            display: block;
        }

        .message.error {
            background: rgba(255, 69, 58, 0.08);
            color: #ff453a;
            border-color: rgba(255, 69, 58, 0.12);
            display: block;
        }

        .message.info {
            background: rgba(36, 129, 204, 0.06);
            color: var(--tg-theme-button-color, #2481cc);
            border-color: rgba(36, 129, 204, 0.08);
            display: block;
        }

        .footer-note {
            margin-top: 20px;
            text-align: center;
            font-size: clamp(11px, 3vw, 13px);
            color: var(--tg-theme-hint-color, #8e8e93);
            opacity: 0.6;
            letter-spacing: 0.2px;
        }

        /* Темная тема */
        @media (prefers-color-scheme: dark) {
            body {
                background: var(--tg-theme-bg-color, #000000);
            }
            .form-card {
                background: var(--tg-theme-secondary-bg-color, #1c1c1e);
                border-color: rgba(255, 255, 255, 0.04);
            }
            .day-checkbox {
                background: var(--tg-theme-bg-color, #2c2c2e);
            }
            .input-wrapper input {
                background: var(--tg-theme-bg-color, #2c2c2e);
            }
            .day-checkbox:has(input:checked) {
                background: rgba(36, 129, 204, 0.08);
            }
            @media (hover: hover) {
                .day-checkbox:hover {
                    background: var(--tg-theme-bg-color, #3a3a3c);
                }
                .password-toggle:hover {
                    background: rgba(255, 255, 255, 0.06);
                    color: var(--tg-theme-text-color, #fff);
                }
            }
            .password-toggle:active {
                background: rgba(255, 255, 255, 0.08);
            }
        }

        /* Безопасные зоны */
        @supports (padding: max(0px)) {
            body {
                padding-left: max(24px, env(safe-area-inset-left));
                padding-right: max(24px, env(safe-area-inset-right));
                padding-bottom: max(24px, env(safe-area-inset-bottom));
                padding-top: max(24px, env(safe-area-inset-top));
            }
        }

        /* Адаптация под очень маленькие экраны */
        @media (max-width: 400px) {
            .form-card {
                padding: 18px 14px 20px;
                border-radius: 24px;
            }
            .days-container {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
            .day-checkbox {
                padding: 10px 6px;
                min-height: 44px;
                font-size: 13px;
            }
            .day-checkbox input[type="checkbox"] {
                width: 20px;
                height: 20px;
            }
            .input-wrapper input {
                padding: 12px 14px;
                font-size: 15px;
                padding-right: 48px;
            }
            .password-toggle {
                right: 10px;
                width: 36px;
                height: 36px;
                font-size: 16px;
            }
            button[type="submit"] {
                padding: 14px 16px;
                min-height: 50px;
                font-size: 16px;
            }
            .header h1 {
                font-size: 24px;
            }
        }

        @media (max-width: 350px) {
            .days-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ Настройка</h1>
            <div class="subtitle">Автоматическое бронирование места</div>
        </div>

        <div class="form-card">
            <form id="bookingForm" action="javascript:void(0);">
                <div class="form-group">
                    <label><span class="emoji">📧</span> Email (логин)</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" required placeholder="example@company.com" autocomplete="email" inputmode="email">
                    </div>
                </div>

                <div class="form-group">
                    <label><span class="emoji">🔒</span> Пароль</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
                        <button type="button" class="password-toggle" id="togglePassword" aria-label="Показать или скрыть пароль">
                            👁️
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label><span class="emoji">💺</span> Номер места</label>
                    <div class="input-wrapper">
                        <input type="text" id="spot_id" required placeholder="Например: 168" autocomplete="off" inputmode="numeric">
                    </div>
                </div>

                <div class="form-group">
                    <label><span class="emoji">📅</span> Дни для бронирования</label>
                    <div class="days-container">
                        <label class="day-checkbox"><input type="checkbox" value="0"> Пн</label>
                        <label class="day-checkbox"><input type="checkbox" value="1"> Вт</label>
                        <label class="day-checkbox"><input type="checkbox" value="2"> Ср</label>
                        <label class="day-checkbox"><input type="checkbox" value="3"> Чт</label>
                        <label class="day-checkbox"><input type="checkbox" value="4"> Пт</label>
                    </div>
                </div>

                <button type="submit">💾 Сохранить</button>
            </form>

            <div id="message" class="message"></div>
            <div class="footer-note">Данные отправляются в защищённом канале</div>
        </div>
    </div>

    <script>
        (function() {
            const tg = window.Telegram.WebApp;
            tg.expand();

            const form = document.getElementById('bookingForm');
            const messageEl = document.getElementById('message');
            const passwordInput = document.getElementById('password');
            const toggleButton = document.getElementById('togglePassword');
            let timeoutId = null;

            // Toggle password visibility
            toggleButton.addEventListener('click', function() {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                toggleButton.textContent = isPassword ? '🙈' : '👁️';
                toggleButton.setAttribute('aria-label', isPassword ? 'Скрыть пароль' : 'Показать пароль');
            });

            function showMessage(text, type = 'info', duration = 3200) {
                if (timeoutId) clearTimeout(timeoutId);
                messageEl.textContent = text;
                messageEl.className = `message ${type}`;
                messageEl.style.display = 'block';

                timeoutId = setTimeout(() => {
                    messageEl.style.display = 'none';
                    messageEl.className = 'message';
                    timeoutId = null;
                }, duration);
            }

            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const email = document.getElementById('email').value.trim();
                const password = passwordInput.value;
                const spotId = document.getElementById('spot_id').value.trim();

                if (!email || !password) {
                    showMessage('❌ Введите email и пароль', 'error');
                    return;
                }

                if (!spotId) {
                    showMessage('❌ Введите номер места', 'error');
                    return;
                }

                const selectedDays = Array.from(document.querySelectorAll('input[type="checkbox"]:checked'))
                    .map(cb => parseInt(cb.value, 10));

                if (selectedDays.length === 0) {
                    showMessage('❌ Выберите хотя бы один день', 'error');
                    return;
                }

                const userData = {
                    email,
                    password,
                    spot_id: spotId,
                    booking_days: selectedDays
                };

                tg.sendData(JSON.stringify(userData));
                showMessage('✅ Настройки сохранены!', 'success', 2500);

                setTimeout(() => {
                    tg.close();
                }, 2300);
            });

            // Подсказка при загрузке
            setTimeout(() => {
                showMessage('✨ Заполните данные и сохраните', 'info', 2000);
            }, 500);

            // Скрываем сообщение при фокусе на поле
            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('focus', () => {
                    if (messageEl.style.display === 'block') {
                        messageEl.style.display = 'none';
                        messageEl.className = 'message';
                        if (timeoutId) {
                            clearTimeout(timeoutId);
                            timeoutId = null;
                        }
                    }
                });
            });

            // Сброс состояния глазка при отправке формы (для безопасности)
            form.addEventListener('submit', function() {
                if (passwordInput.type === 'text') {
                    passwordInput.type = 'password';
                    toggleButton.textContent = '👁️';
                    toggleButton.setAttribute('aria-label', 'Показать пароль');
                }
            });
        })();
    </script>
</body>
</html>
