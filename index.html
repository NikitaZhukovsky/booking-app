<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма для Firestore</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
        }
        .container { max-width: 400px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #d1d1d1);
            border-radius: 8px;
            font-size: 16px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000000);
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: var(--tg-theme-button-color, #0088cc);
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .loading { 
            display: none; 
            text-align: center; 
            margin-top: 10px; 
            color: var(--tg-theme-hint-color, #999999); 
        }
        .error { 
            color: #ff4444; 
            margin-top: 10px; 
            text-align: center; 
            padding: 10px;
            background: #ffebee;
            border-radius: 8px;
        }
        .success { 
            color: #00c851; 
            margin-top: 10px; 
            text-align: center; 
            padding: 10px;
            background: #e8f5e9;
            border-radius: 8px;
        }
        .info {
            color: var(--tg-theme-hint-color, #666);
            font-size: 14px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Заполните форму</h1>
        
        <form id="dataForm">
            <div class="form-group">
                <label for="userName">👤 Имя</label>
                <input type="text" id="userName" placeholder="Введите ваше имя" required>
            </div>
            
            <div class="form-group">
                <label for="userAge">📅 Возраст</label>
                <input type="number" id="userAge" placeholder="Введите ваш возраст" min="1" max="150" required>
            </div>
            
            <div class="form-group">
                <label for="userEmail">📧 Email</label>
                <input type="email" id="userEmail" placeholder="Введите ваш email" required>
            </div>
            
            <button type="submit" id="submitBtn">Отправить</button>
            <div class="loading" id="loadingIndicator">⏳ Отправка данных...</div>
            <div id="message"></div>
        </form>
        
        <div class="info" id="statusInfo">⏳ Ожидание ввода...</div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation(); // Запрос подтверждения при закрытии
        
        // Получаем элементы
        const form = document.getElementById('dataForm');
        const submitBtn = document.getElementById('submitBtn');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const messageDiv = document.getElementById('message');
        const statusInfo = document.getElementById('statusInfo');
        
        // Показываем, что приложение загружено
        statusInfo.textContent = '✅ Приложение загружено. Заполните форму.';
        
        // Получаем данные пользователя для отладки
        try {
            const user = tg.initDataUnsafe?.user;
            if (user) {
                console.log('👤 Пользователь Telegram:', user);
                statusInfo.textContent = `👤 Пользователь: ${user.first_name || 'Неизвестно'}`;
            }
        } catch (e) {
            console.log('Не удалось получить данные пользователя');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Собираем данные
            const name = document.getElementById('userName').value.trim();
            const age = parseInt(document.getElementById('userAge').value);
            const email = document.getElementById('userEmail').value.trim();
            
            console.log('📝 Данные формы:', { name, age, email });
            
            // Валидация
            if (!name || !age || !email) {
                messageDiv.textContent = '❌ Пожалуйста, заполните все поля';
                messageDiv.className = 'error';
                return;
            }
            
            if (isNaN(age) || age < 1 || age > 150) {
                messageDiv.textContent = '❌ Введите корректный возраст (1-150)';
                messageDiv.className = 'error';
                return;
            }
            
            const formData = { name, age, email };
            
            // Блокируем кнопку
            submitBtn.disabled = true;
            loadingIndicator.style.display = 'block';
            messageDiv.textContent = '';
            messageDiv.className = '';
            statusInfo.textContent = '⏳ Отправка данных...';
            
            try {
                console.log('📤 Отправка данных в бота:', formData);
                
                // Отправляем данные в Telegram бота
                tg.sendData(JSON.stringify(formData));
                
                console.log('✅ Данные отправлены через tg.sendData()');
                
                // Показываем успех
                messageDiv.textContent = '✅ Данные успешно отправлены!';
                messageDiv.className = 'success';
                statusInfo.textContent = '✅ Данные отправлены в бота';
                
                // Закрываем через 2 секунды
                setTimeout(() => {
                    tg.close();
                }, 2000);
                
            } catch (error) {
                console.error('❌ Ошибка при отправке:', error);
                messageDiv.textContent = '❌ Произошла ошибка при отправке: ' + error.message;
                messageDiv.className = 'error';
                statusInfo.textContent = '❌ Ошибка отправки';
                submitBtn.disabled = false;
                loadingIndicator.style.display = 'none';
            }
        });
        
        // Настройка темы
        tg.onEvent('themeChanged', () => {
            const theme = tg.themeParams;
            document.documentElement.style.setProperty('--tg-theme-bg-color', theme.bg_color || '#ffffff');
            document.documentElement.style.setProperty('--tg-theme-text-color', theme.text_color || '#000000');
            document.documentElement.style.setProperty('--tg-theme-hint-color', theme.hint_color || '#999999');
            document.documentElement.style.setProperty('--tg-theme-button-color', theme.button_color || '#0088cc');
            document.documentElement.style.setProperty('--tg-theme-button-text-color', theme.button_text_color || '#ffffff');
            document.documentElement.style.setProperty('--tg-theme-secondary-bg-color', theme.secondary_bg_color || '#f5f5f5');
        });
        
        // Логируем, что скрипт загружен
        console.log('🚀 Mini App загружен и готов к работе!');
    </script>
</body>
</html>
