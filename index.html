<!-- mini-app.html -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма для Firestore</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
        }
        .container { max-width: 400px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #d1d1d1);
            border-radius: 8px;
            font-size: 16px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000000);
        }
        input:focus {
            outline: none;
            border-color: var(--tg-theme-button-color, #0088cc);
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .loading { display: none; text-align: center; margin-top: 10px; color: var(--tg-theme-hint-color, #999999); }
        .error { color: red; margin-top: 10px; text-align: center; }
        .success { color: green; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Заполните форму</h1>
        
        <form id="dataForm">
            <div class="form-group">
                <label for="userName">👤 Имя</label>
                <input type="text" id="userName" placeholder="Введите ваше имя" required>
            </div>
            
            <div class="form-group">
                <label for="userAge">📅 Возраст</label>
                <input type="number" id="userAge" placeholder="Введите ваш возраст" min="1" max="150" required>
            </div>
            
            <div class="form-group">
                <label for="userEmail">📧 Email</label>
                <input type="email" id="userEmail" placeholder="Введите ваш email" required>
            </div>
            
            <button type="submit" id="submitBtn">Отправить</button>
            <div class="loading" id="loadingIndicator">⏳ Отправка...</div>
            <div id="message"></div>
        </form>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const form = document.getElementById('dataForm');
        const submitBtn = document.getElementById('submitBtn');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('userName').value.trim(),
                age: parseInt(document.getElementById('userAge').value),
                email: document.getElementById('userEmail').value.trim()
            };
            
            if (!formData.name || !formData.age || !formData.email) {
                messageDiv.textContent = '❌ Пожалуйста, заполните все поля';
                messageDiv.className = 'error';
                return;
            }
            
            submitBtn.disabled = true;
            loadingIndicator.style.display = 'block';
            messageDiv.textContent = '';
            messageDiv.className = '';
            
            try {
                // Отправляем данные в бота
                tg.sendData(JSON.stringify(formData));
                
                messageDiv.textContent = '✅ Данные успешно отправлены в Firestore!';
                messageDiv.className = 'success';
                
                setTimeout(() => {
                    tg.close();
                }, 2000);
                
            } catch (error) {
                console.error('Ошибка:', error);
                messageDiv.textContent = '❌ Произошла ошибка при отправке';
                messageDiv.className = 'error';
                submitBtn.disabled = false;
                loadingIndicator.style.display = 'none';
            }
        });
        
        // Настройка темы
        tg.onEvent('themeChanged', () => {
            document.documentElement.style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#ffffff');
            document.documentElement.style.setProperty('--tg-theme-text-color', tg.themeParams.text_color || '#000000');
            document.documentElement.style.setProperty('--tg-theme-hint-color', tg.themeParams.hint_color || '#999999');
            document.documentElement.style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#0088cc');
            document.documentElement.style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color || '#ffffff');
            document.documentElement.style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color || '#f5f5f5');
        });
    </script>
</body>
</html>
